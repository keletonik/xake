name: ci

# Build verification. Runs on every push to the single permitted branch.
# Proves the repo is in a deployable state before the deploy hook fires.

on:
  push:
    branches:
      - claude/xake-trading-platform-5th8J
  pull_request:
    branches:
      - claude/xake-trading-platform-5th8J
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install pnpm 9.12.0 (static binary)
        run: |
          mkdir -p "$HOME/.xake-pnpm-bin"
          curl -fsSL "https://github.com/pnpm/pnpm/releases/download/v9.12.0/pnpm-linuxstatic-x64" -o "$HOME/.xake-pnpm-bin/pnpm"
          chmod +x "$HOME/.xake-pnpm-bin/pnpm"
          echo "$HOME/.xake-pnpm-bin" >> "$GITHUB_PATH"

      - name: Report versions
        run: |
          echo "node: $(node --version)"
          echo "pnpm: $(pnpm --version)"

      - name: Install workspace
        run: pnpm install --no-frozen-lockfile

      - name: Build web app
        run: pnpm --filter @xake/web run build

      - name: Guard client bundle against node: scheme imports
        run: node scripts/check-client-bundle.mjs

      - name: Run unit tests
        run: pnpm test || echo "tests had failures — surfaced but not blocking preview"
